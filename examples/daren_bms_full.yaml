# Example configuration for Daren BMS with all sensors enabled
# This shows all available sensors and settings for the Daren BMS component

# Basic ESP32 configuration
esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# UART configuration for Daren BMS
# Use the correct RX and TX pins for your setup
# Common choices: GPIO16 (RX), GPIO17 (TX) for ESP32
# Note: You 'll need a RS485 transceiver between the ESP32 and BMS
uart:
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600

# Daren BMS configuration
daren_bms:
  # Optional: Set the BMS device address (default is 0x01)
  # device_address: 0x01

  # Optional: Set update interval (default is 30s)
  # update_interval: 30s

binary_sensor:
  - platform: daren_bms
    charging:
      name: "Battery Charging"
    discharging:
      name: "Battery Discharging"
    balancing:
      name: "Battery Balanced"
    online_status:
      name: "BMS Online Status"

sensor:
  - platform: daren_bms
    delta_cell_voltage:
      name: "Cell Voltage Delta"
    average_cell_voltage:
      name: "Average Cell Voltage"
    cell_count:
      name: "Cell Count"
    total_voltage:
      name: "Total Voltage"
    current:
      name: "Battery Current"
    capacity_remaining:
      name: "Capacity Remaining"
    charging_cycles:
      name: "Charging Cycles"
    state_of_charge:
      name: "State of Charge"
    state_of_health:
      name: "State of Health"

    # Temperature sensors
    mos_temperature:
      name: "MOS Temperature"
    env_temperature:
      name: "Environment Temperature"
    pack_temperature:
      name: "Pack Temperature"
    temperature_sensor_1:
      name: "Temperature Sensor 1"
    temperature_sensor_2:
      name: "Temperature Sensor 2"
    temperature_sensor_3:
      name: "Temperature Sensor 3"
    temperature_sensor_4:
      name: "Temperature Sensor 4"
    temperature_sensors:
      name: "Total Temperature Sensors"

    # Individual cell voltage sensors
    cell_voltage_1:
      name: "Cell 1 Voltage"
    cell_voltage_2:
      name: "Cell 2 Voltage"
    cell_voltage_3:
      name: "Cell 3 Voltage"
    cell_voltage_4:
      name: "Cell 4 Voltage"
    cell_voltage_5:
      name: "Cell 5 Voltage"
    cell_voltage_6:
      name: "Cell 6 Voltage"
    cell_voltage_7:
      name: "Cell 7 Voltage"
    cell_voltage_8:
      name: "Cell 8 Voltage"
    cell_voltage_9:
      name: "Cell 9 Voltage"
    cell_voltage_10:
      name: "Cell 10 Voltage"
    cell_voltage_11:
      name: "Cell 11 Voltage"
    cell_voltage_12:
      name: "Cell 12 Voltage"
    cell_voltage_13:
      name: "Cell 13 Voltage"
    cell_voltage_14:
      name: "Cell 14 Voltage"
    cell_voltage_15:
      name: "Cell 15 Voltage"
    cell_voltage_16:
      name: "Cell 16 Voltage"

# Optional: Add additional sensors or components as needed
# For example, you might want to add:
# - A switch to control charging/discharging
# - Additional temperature sensors
# - Voltage dividers for more accurate measurements
# - Current sensors for verification

# Note: Not all sensors may be available on your specific BMS model
# Check the documentation for your BMS to see which sensors are supported
